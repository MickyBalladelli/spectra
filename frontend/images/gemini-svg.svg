<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <linearGradient id="turboGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#7f00ff" />
    </linearGradient>
    
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>
  <rect width="100" height="100" rx="22" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>

  <path d="M22 22h56v56H22z" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <path d="M41 22v56 M59 22v56 M22 41h56 M22 59h56" fill="none" stroke="rgba(0, 242, 254, 0.12)" stroke-width="0.75" stroke-dasharray="2 2"/>

  <path d="M26 36 C 40 21, 60 21, 74 36 C 88 51, 12 51, 26 66 C 40 81, 60 81, 74 66" 
        fill="none" 
        stroke="url(#turboGrad)" 
        stroke-width="7.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>

  <circle cx="26" cy="36" r="3.5" fill="#00f2fe" filter="url(#glow)" />
  <circle cx="50" cy="51" r="4.5" fill="#4facfe" filter="url(#glow)" />
  <circle cx="74" cy="66" r="3.5" fill="#7f00ff" filter="url(#glow)" />
